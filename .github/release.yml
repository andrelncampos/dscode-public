# GitHub auto-generated release notes configuration
# Used by release.yml workflow via "gh release create --generate-notes"
#
# Labels required in the repository:
#   feature, enhancement  → 🚀 Features
#   bug, fix              → 🐛 Bug Fixes
#   documentation, docs   → 📚 Documentation
#   chore, dependencies   → 🔧 Maintenance
#   breaking              → ⚠️ Breaking Changes
#
# Unlabeled PRs fall into "Other Changes".

changelog:
  exclude:
    labels:
      - ignore-for-release
      - duplicate
      - invalid
      - wontfix
    authors:
      - dependabot
      - dependabot[bot]

  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
        - feat

    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
        - bugfix

    - title: 📚 Documentation
      labels:
        - documentation
        - docs

    - title: 🔧 Maintenance
      labels:
        - chore
        - maintenance
        - dependencies
        - refactor

    - title: ⚠️ Breaking Changes
      labels:
        - breaking
        - breaking-change
        - major

    - title: Other Changes
      labels:
        - "*"
