name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_windows:
        description: "Build Windows x64"
        type: boolean
        default: true
      build_linux:
        description: "Build Linux x64"
        type: boolean
        default: true
      build_macos_arm:
        description: "Build macOS ARM64 (Apple Silicon)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows x64
    if: ${{ github.actor != 'dependabot[bot]' && (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.build_windows == true)) }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeCheck + Lint + Format Check
        run: npm run check

      - name: Bundle
        run: npm run bundle

      - name: Build binary (SEA)
        run: npm run build:binary

      - name: Package binary
        run: npm run package:binary

      - name: Validate binary
        run: npm run validate:binary

      - name: Validate asset names match tag
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Tag: $TAG  Version: $VERSION"
          BAD=0
          for f in release/packages/*; do
            echo "  Checking $f..."
            if [[ "$f" != *"$VERSION"* ]]; then
              echo "::error::Asset $f does not contain version $VERSION (from tag $TAG)"
              BAD=1
            fi
          done
          for f in release/checksums/checksums.txt; do
            if grep -qv "$VERSION" "$f"; then
              echo "::error::checksums.txt references wrong version"
              BAD=1
            fi
          done
          if [ "$BAD" -ne 0 ]; then
            echo "::error::Asset name validation FAILED. Aborting before upload."
            exit 1
          fi
          echo "All asset names match tag $TAG"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release/packages/*
          if-no-files-found: error
          retention-days: 3

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums-windows-x64
          path: release/checksums/checksums.txt
          if-no-files-found: error
          retention-days: 3

  build-linux:
    name: Build Linux x64
    if: ${{ github.actor != 'dependabot[bot]' && (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.build_linux == true)) }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeCheck + Lint + Format Check
        run: npm run check

      - name: Bundle
        run: npm run bundle

      - name: Build binary (SEA)
        run: npm run build:binary

      - name: Package binary
        run: npm run package:binary

      - name: Validate binary
        run: npm run validate:binary

      - name: Validate asset names match tag
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          BAD=0
          for f in release/packages/*; do
            if [[ "$f" != *"$VERSION"* ]]; then
              echo "::error::Asset $f missing version $VERSION"
              BAD=1
            fi
          done
          for f in release/checksums/checksums.txt; do
            if grep -qv "$VERSION" "$f"; then
              echo "::error::checksums.txt references wrong version"
              BAD=1
            fi
          done
          if [ "$BAD" -ne 0 ]; then exit 1; fi
          echo "All asset names match tag $TAG"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: release/packages/*
          if-no-files-found: error
          retention-days: 3

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums-linux-x64
          path: release/checksums/checksums.txt
          if-no-files-found: error
          retention-days: 3

  build-macos-arm:
    name: Build macOS ARM64
    if: ${{ github.actor != 'dependabot[bot]' && (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.build_macos_arm == true)) }}
    runs-on: macos-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeCheck + Lint + Format Check
        run: npm run check

      - name: Bundle
        run: npm run bundle

      - name: Build binary (SEA)
        run: npm run build:binary

      - name: Package binary
        run: npm run package:binary

      - name: Validate binary
        run: npm run validate:binary

      - name: Validate asset names match tag
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          BAD=0
          for f in release/packages/*; do
            if [[ "$f" != *"$VERSION"* ]]; then
              echo "::error::Asset $f missing version $VERSION"
              BAD=1
            fi
          done
          for f in release/checksums/checksums.txt; do
            if grep -qv "$VERSION" "$f"; then
              echo "::error::checksums.txt references wrong version"
              BAD=1
            fi
          done
          if [ "$BAD" -ne 0 ]; then exit 1; fi
          echo "All asset names match tag $TAG"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: release/packages/*
          if-no-files-found: error
          retention-days: 3

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums-macos-arm64
          path: release/checksums/checksums.txt
          if-no-files-found: error
          retention-days: 3

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
      - build-macos-arm
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download Windows artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: windows-x64
          path: release-artifacts/windows-x64

      - name: Download Linux artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: linux-x64
          path: release-artifacts/linux-x64

      - name: Download macOS ARM artifact (optional)
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        continue-on-error: true
        with:
          name: macos-arm64
          path: release-artifacts/macos-arm64

      - name: Download Windows checksums
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: checksums-windows-x64
          path: release-artifacts/checksums-windows

      - name: Download Linux checksums
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: checksums-linux-x64
          path: release-artifacts/checksums-linux

      - name: Download macOS ARM checksums (optional)
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        continue-on-error: true
        with:
          name: checksums-macos-arm64
          path: release-artifacts/checksums-macos-arm

      - name: Merge checksums
        run: |
          mkdir -p release-out
          find release-artifacts -name "*.zip" -o -name "*.tar.gz" | while read f; do
            cp "$f" release-out/
          done
          find release-artifacts -name "checksums.txt" -exec cat {} \; > release-out/checksums.txt
          echo "--- Release artifacts ---"
          ls -la release-out/

      - name: Create release and remove source code assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          echo "=== Criando release $TAG ==="
          gh release create "$TAG" release-out/* \
            --repo "$REPO" \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md \
            --latest

          echo "=== Aguardando assets serem populados ==="
          sleep 5

          echo "=== Assets na release ==="
          gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name'

          echo "=== Removendo source code assets ==="
          gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[] | select(.name | contains("Source code")) | .id' | while read id; do
            echo "Deletando asset $id..."
            gh api -X DELETE "repos/$REPO/releases/assets/$id" --silent || echo "FALHA ao deletar $id"
          done

          echo "=== Assets finais ==="
          gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name'

      - name: Publish release to public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          PUBLIC_REPO="andrelncampos/dscode-public"

          echo "=== Criando release $TAG no repo público ==="
          gh release create "$TAG" release-out/* \
            --repo "$PUBLIC_REPO" \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md \
            --latest

          sleep 5

          echo "=== Removendo source code assets do repo público ==="
          gh release view "$TAG" --repo "$PUBLIC_REPO" --json assets -q '.assets[] | select(.name | contains("Source code")) | .id' | while read id; do
            echo "Deletando asset $id..."
            gh api -X DELETE "repos/$PUBLIC_REPO/releases/assets/$id" --silent || echo "FALHA ao deletar $id"
          done

          echo "=== Release pública criada ==="
          gh release view "$TAG" --repo "$PUBLIC_REPO" --json assets -q '.assets[].name'

  verify-public-release:
    name: Verify public release
    runs-on: ubuntu-latest
    needs: create-release
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Check that release exists on public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          PUBLIC_REPO="andrelncampos/dscode-public"
          ASSETS=$(gh release view "$TAG" --repo "$PUBLIC_REPO" --json assets -q '.assets | length')
          if [ "$ASSETS" -lt 2 ]; then
            echo "ERRO: Release pública tem apenas $ASSETS assets. Esperado >= 2 (Windows + Linux)."
            exit 1
          fi
          echo "✅ Release pública verificada: $ASSETS assets."
          echo "=== Assets ==="
          gh release view "$TAG" --repo "$PUBLIC_REPO" --json assets -q '.assets[].name'
