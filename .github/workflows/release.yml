name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeCheck + Lint + Format Check
        run: npm run check

      - name: Bundle
        run: npm run bundle

      - name: Test
        run: npm test

      - name: Create launcher scripts
        run: |
          mkdir -p release/pkg

          # Unix launcher (Linux + macOS)
          printf '#!/usr/bin/env bash\nDIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"\nexec node "$DIR/cli.js" "$@"\n' > release/pkg/dscode
          chmod +x release/pkg/dscode

          # Windows launcher
          printf '@echo off\r\nnode "%%~dp0\\cli.js" %%*\r\n' > release/pkg/dscode.cmd

          # Copy bundled CLI and docs
          cp dist/cli.js release/pkg/
          cp LICENSE release/pkg/
          cp NOTICE release/pkg/
          cp README.md release/pkg/

      - name: Create platform archives
        run: |
          mkdir -p release/out

          # Windows x64 (.zip)
          cd release/pkg && zip -r ../../release/out/dscode-windows-x64.zip ./* && cd ../..

          # Linux x64 (.tar.gz)
          cd release/pkg && tar -czf ../../release/out/dscode-linux-x64.tar.gz ./* && cd ../..

          # macOS Intel x64 (.tar.gz)
          cd release/pkg && tar -czf ../../release/out/dscode-macos-x64.tar.gz ./* && cd ../..

          # macOS Apple Silicon ARM64 (.tar.gz)
          cd release/pkg && tar -czf ../../release/out/dscode-macos-arm64.tar.gz ./* && cd ../..

      - name: Generate checksums
        run: |
          cd release/out
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062c08b532815e1b6df124d8e7c9b5aa36a0e5f # v2.0.8
        with:
          files: |
            release/out/dscode-windows-x64.zip
            release/out/dscode-linux-x64.tar.gz
            release/out/dscode-macos-x64.tar.gz
            release/out/dscode-macos-arm64.tar.gz
            release/out/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
