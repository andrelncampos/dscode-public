name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-artifacts:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            runner: windows-latest
            node-version: "24"
          - platform: linux-x64
            runner: ubuntu-latest
            node-version: "24"
          - platform: macos-x64
            runner: macos-13
            node-version: "24"
          - platform: macos-arm64
            runner: macos-latest
            node-version: "24"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeCheck + Lint + Format Check
        run: npm run check

      - name: Bundle
        run: npm run bundle

      - name: Build binary (SEA)
        run: npm run build:binary

      - name: Package binary
        run: npm run package:binary

      - name: Validate binary
        run: npm run validate:binary

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: release/packages/*
          if-no-files-found: error

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.platform }}
          path: release/checksums/checksums.txt
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-artifacts
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          path: release-artifacts

      - name: Merge checksums
        run: |
          mkdir -p release-out
          # Move all package files to release-out
          find release-artifacts -name "*.zip" -o -name "*.tar.gz" | while read f; do
            cp "$f" release-out/
          done
          # Merge all checksums
          find release-artifacts -name "checksums.txt" -exec cat {} \; > release-out/checksums.txt
          echo "--- Release artifacts ---"
          ls -la release-out/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.0.8
        with:
          files: release-out/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remover source code assets automáticos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/${{ github.ref_name }} --jq '.id')
          gh api "repos/${{ github.repository }}/releases/$RELEASE_ID/assets" --jq '.[] | select(.name | test("Source code")) | .id' | while read id; do
            echo "Removendo asset $id..."
            gh api "repos/${{ github.repository }}/releases/assets/$id" -X DELETE
          done
