name: Release Dry Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dry-run:
    name: Dry run ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            runner: windows-latest
            node-version: "24"
          - platform: linux-x64
            runner: ubuntu-latest
            node-version: "24"
          - platform: macos-x64
            runner: macos-13
            node-version: "24"
          - platform: macos-arm64
            runner: macos-latest
            node-version: "24"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeCheck + Lint + Format Check
        run: npm run check

      - name: Bundle
        run: npm run bundle

      - name: Build binary (SEA)
        run: npm run build:binary

      - name: Package binary
        run: npm run package:binary

      - name: Validate binary
        run: npm run validate:binary

      - name: Upload package artifact (dry-run)
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-${{ matrix.platform }}
          path: release/packages/*
          retention-days: 7
          if-no-files-found: error
